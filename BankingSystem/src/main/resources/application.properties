spring.application.name=BankingSystem

#port where application run
server.port=8085

#credential to connect with database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bankingDB}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_password_here}

#tell spring boot to auto create table in db
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

#jwt credentials
jwt.secret=${JWT_SECRET:your_jwt_secret_here}
jwt.expiration=${JWT_EXPIRATION:86400000}

#admin credentials
admin.email=${ADMIN_EMAIL:admin@banking.com}
admin.password=${ADMIN_PASSWORD:your_admin_password_here}
admin.firstName=${ADMIN_FIRST_NAME:Super}
admin.lastName=${ADMIN_LAST_NAME:Admin}